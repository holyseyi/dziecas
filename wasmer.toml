[package]
name = "moviehub"
version = "1.0.0"
description = "MovieHub Entertainment Portal"
author = "MovieHub Team"
license = "MIT"
repository = ""

[service]
http = true
port = 8000
document_root = "public"

[service.env]
APP_ENV = "production"
APP_DEBUG = "false"
APP_URL = "https://dziecas.wasmer.app"
DB_PATH = "/tmp/moviehub.sqlite"

[service.command]
command = "php"
args = ["-S", "0.0.0.0:8000", "-t", "public"]

[deployment]
runtime = "php"
version = "8.3"
